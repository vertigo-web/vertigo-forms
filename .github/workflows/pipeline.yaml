name: Build
on:
  pull_request:
  push:
    branches: [master]

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RUSTC_WRAPPER: "sccache"
  RUSTFLAGS: -D warnings
  SCCACHE_GHA_ENABLED: "true"

jobs:

  nightly-clippy:
    name: Nightly clippy (wasm32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "deps-cache-stable"
          cache-targets: "false" # IMPORTANT: Let sccache handle target artifacts
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
          target: wasm32-unknown-unknown
          components: clippy, rustfmt

      # Formatting check
      - name: Check formatting
        run: cargo fmt -- --check

      # Clippy checks
      - name: Clippy (stable)
        uses: giraffate/clippy-action@v1
        with:
          tool_name: "Clippy (stable)"
          reporter: github-pr-review
          filter_mode: added
          github_token: ${{ secrets.GITHUB_TOKEN }}
          clippy_flags: --all --all-features --tests --locked

      # Unit tests
      - name: Unit tests
        run: cargo test --all --all-features --locked
